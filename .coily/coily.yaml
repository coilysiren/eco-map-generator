# Per-repo command allowlist for eco-cycle-prep. Coily is the canonical entry
# point for dev verbs here; each command below delegates to a Make target.
# Operators (human or agent) type `coily <verb>`, not `make <target>` -
# the lockdown denies bare uv/python invocations.
#
# Make-target arguments are forwarded as `key=value` pairs validated by
# coily's argv policy (shell metacharacters rejected).
#
# Names follow coily's [a-z0-9-] rule and mirror the underlying CLI shape.

commands:
  sync:
    run: make sync
    description: Install runtime + dev deps via uv.

  # --- cycle prep ---
  prep:
    run: make prep
    description: Weekly cycle prep - steamcmd update, sibling git pulls, Discord digest. Args - cycle=N.
  brief:
    run: make brief
    description: Full cycle channel pull plus suggestions/forum lookback. Args - cycle=N days=D.
  forum-dump:
    run: make forum-dump
    description: Standalone dump of the suggestions forum. Args - days=D.

  # --- map rolls ---
  roll:
    run: make roll
    description: Roll one worldgen seed end-to-end and post the preview. Args - cycle=N seed=S.
  post-roll:
    run: make post-roll
    description: Replay the Discord post for an already-captured roll preview. Args - cycle=N roll=R.
  narrate:
    run: make narrate
    description: Describe a generated map in prose. Args - gif=PATH config=PATH features=1.

  # --- mod management ---
  mods-sync:
    run: make mods-sync
    description: Clone eco-mods + eco-mods-public on kai-server and copy to the Eco install. Lockdown-gated. Args - check=1.
  mods-disable:
    run: make mods-disable
    description: Remove mod folders from the live server (ephemeral). Args - names=A,B,C.
  mods-sweep:
    run: make mods-sweep
    description: Prune orphaned AutoGen overrides on the live server whose source mod is gone. Idempotent.

  # --- announcements ---
  ad:
    run: make ad
    description: Emit the cross-server ad markdown. Args - cycle=N start_ts=UNIX.
  sirens-post:
    run: make sirens-post
    description: "Emit the Sirens #eco-configs channel kickoff post. Args - cycle=N start_ts=UNIX."
  ingame:
    run: make ingame
    description: Render in-game Name + DetailedDescription. Args - cycle=N sync=1.

  # --- discord plumbing ---
  discord-post:
    run: make discord-post
    description: Post a one-off content message via the sirens-echo bot. Args - channel=ALIAS body=STR or from_file=PATH.
  restart-notice:
    run: make restart-notice
    description: "Pre-restart heads-up embed to #eco-status. Args - reason=STR."
  ops-notice:
    run: make ops-notice
    description: "Post the literal text of an ops command to #eco-status before running. Args - command=STR."

  # --- go-live / go-private ---
  go-live:
    run: make go-live
    description: Flip the running server to public + no-password on kai-server. Args - restart=true|false.
  go-private:
    run: make go-private
    description: Inverse of go-live - re-privatize the running server. Args - restart=true|false.

  # --- local Eco server (Windows / Mac) ---
  server-run:
    run: make server-run
    description: Rewrite Configs for private-local dev then launch the local EcoServer. Args - offline=1.
  server-launch:
    run: make server-launch
    description: Launch the local EcoServer as-is with no config rewrite. Args - offline=1.
  server-copy-configs:
    run: make server-copy-configs
    description: Copy Configs/ from sibling eco-configs into the local Eco server.
  server-copy-public-mods:
    run: make server-copy-public-mods
    description: Copy Mods/ from sibling eco-mods-public into the local Eco server.
  server-copy-private-mods:
    run: make server-copy-private-mods
    description: Copy Mods/ from sibling eco-mods into the local Eco server.
  server-deploy-mod:
    run: make server-deploy-mod
    description: Drop a pre-built mod DLL into the local Server/Mods/<name>/. Args - dll=PATH name=STR.
  server-regen-new:
    run: make server-regen-new
    description: Wipe Storage + Logs and force a fresh random world on the local server. Args - seed=N.
  server-regen-same:
    run: make server-regen-same
    description: Wipe Storage + Logs but keep the current WorldGenerator.eco seed.

# Catalog metadata for the cross-repo knowledge graph.
# Schema: coilysiren/agentic-os-kai#420 (tracker).
catalog:
  kind: Component
  type: service
  system: eco
  owner: kai
  lifecycle: production
  description: "Cycle-prep automation for an Eco multiplayer server: worldgen rolls, Discord announcements, mod sync, community-intel digest."
  dependsOn:
    - forgejo.coilysiren.me/coilysiren/coily
    - forgejo.coilysiren.me/coilysiren/eco-mods-public
    - forgejo.coilysiren.me/coilysiren/infrastructure
